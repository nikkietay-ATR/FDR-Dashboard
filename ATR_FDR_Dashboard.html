<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATR — FDR Shift Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #AACD61;
    --green-dark: #8fb048;
    --teal: #4B929B;
    --teal-light: #e8f4f5;
    --grey: #515252;
    --melon: #E0694A;
    --yellow: #F6CD61;
    --muttro: #4B618C;
    --bg: #F5F4F0;
    --card: #ffffff;
    --border: #e2e0db;
    --text: #2a2a2a;
    --text-light: #6b6b6b;
    --radius: 10px;
    --shadow: 0 2px 8px rgba(0,0,0,0.07);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* LOGIN */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--grey);
  }

  .login-card {
    background: white;
    border-radius: 16px;
    padding: 48px 40px;
    width: 380px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }

  .login-logo {
    width: 56px;
    height: 56px;
    background: var(--green);
    border-radius: 14px;
    margin: 0 auto 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
  }

  .login-card h1 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 4px;
  }

  .login-card p {
    color: var(--text-light);
    font-size: 13px;
    margin-bottom: 28px;
  }

  .login-select {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: white;
    appearance: none;
    cursor: pointer;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .login-select:focus { outline: none; border-color: var(--teal); }

  .login-btn {
    width: 100%;
    padding: 13px;
    background: var(--green);
    border: none;
    border-radius: var(--radius);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 600;
    color: #2a2a2a;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  .login-btn:hover { background: var(--green-dark); }
  .login-btn:active { transform: scale(0.98); }

  /* HEADER */
  #app { display: none; }

  .header {
    background: var(--grey);
    color: white;
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header-logo {
    width: 30px;
    height: 30px;
    background: var(--green);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
  }

  .header h1 {
    font-size: 15px;
    font-weight: 600;
    letter-spacing: -0.2px;
  }

  .header-date {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    font-family: 'DM Mono', monospace;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .user-badge {
    background: rgba(255,255,255,0.1);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .user-role {
    font-size: 10px;
    background: var(--green);
    color: #2a2a2a;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .logout-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    padding: 5px 12px;
    border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .logout-btn:hover { background: rgba(255,255,255,0.1); }

  /* LAYOUT */
  .main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 24px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto;
    gap: 16px;
  }

  .section-full { grid-column: 1 / -1; }

  /* CARDS */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .card-header {
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }

  .card-title {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-light);
  }

  .card-title .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }

  .card-body { padding: 16px 18px; }

  /* UPDATES */
  .update-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }
  .update-item:last-child { border-bottom: none; }

  .update-badge {
    flex-shrink: 0;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 2px;
  }
  .badge-important { background: #fef0eb; color: var(--melon); }
  .badge-info { background: #eef6f7; color: var(--teal); }

  .update-content { flex: 1; }

  .update-text {
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }

  .update-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 4px;
  }

  .update-author {
    font-size: 11px;
    color: var(--text-light);
    font-family: 'DM Mono', monospace;
  }

  .update-time {
    font-size: 11px;
    color: var(--text-light);
  }

  .read-btn {
    flex-shrink: 0;
    background: none;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 11px;
    font-family: 'DM Sans', sans-serif;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.2s;
  }
  .read-btn:hover { background: var(--green); border-color: var(--green); color: #2a2a2a; }
  .read-btn.read { background: #f0f7e6; border-color: var(--green); color: var(--green-dark); }

  .unread-dot {
    width: 7px;
    height: 7px;
    background: var(--melon);
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .unread-dot.seen { background: transparent; }

  .empty-state {
    text-align: center;
    padding: 32px 16px;
    color: var(--text-light);
    font-size: 13px;
  }
  .empty-state .icon { font-size: 28px; margin-bottom: 8px; }

  /* POST UPDATE (supervisor) */
  .post-update-form {
    padding: 14px 18px;
    background: #fafaf8;
    border-top: 1px solid var(--border);
  }

  .form-row { display: flex; gap: 8px; margin-bottom: 8px; }

  .form-select, .form-input, .form-textarea {
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 8px 11px;
    color: var(--text);
    background: white;
    transition: border-color 0.2s;
  }
  .form-select:focus, .form-input:focus, .form-textarea:focus {
    outline: none;
    border-color: var(--teal);
  }
  .form-textarea {
    width: 100%;
    resize: none;
    height: 64px;
    margin-bottom: 8px;
  }
  .form-select { background: white; cursor: pointer; }

  .post-btn {
    background: var(--teal);
    color: white;
    border: none;
    border-radius: 7px;
    padding: 8px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.2s;
  }
  .post-btn:hover { background: #3d7a82; }

  /* DOGS */
  .dogs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 10px;
  }

  .dog-card {
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    position: relative;
  }

  .dog-name {
    font-weight: 600;
    font-size: 13px;
    margin-bottom: 2px;
  }

  .dog-tier {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text-light);
    margin-bottom: 8px;
  }

  .dog-reqs {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
  }

  .req-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    background: #f0f7e6;
    color: var(--green-dark);
    font-weight: 500;
  }
  .req-tag.req-special { background: #fef0eb; color: var(--melon); }
  .req-tag.req-dog { background: #eef2fa; color: var(--muttro); }

  .dog-delete {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 2px;
    transition: color 0.2s;
  }
  .dog-delete:hover { color: var(--melon); }

  /* ADD DOG FORM */
  .add-dog-form {
    padding: 14px 18px;
    background: #fafaf8;
    border-top: 1px solid var(--border);
  }
  .add-dog-form .form-row { flex-wrap: wrap; }
  .add-dog-form input { flex: 1; min-width: 120px; }

  /* APPOINTMENTS */
  .appt-list { display: flex; flex-direction: column; gap: 8px; }

  .appt-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 12px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    transition: border-color 0.2s;
  }
  .appt-item:hover { border-color: var(--teal); }

  .appt-time {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--teal);
    min-width: 48px;
  }

  .appt-info { flex: 1; }

  .appt-dog {
    font-weight: 600;
    font-size: 13px;
  }

  .appt-adopter {
    font-size: 11px;
    color: var(--text-light);
  }

  .appt-handler {
    font-size: 11px;
    background: #f0f7e6;
    color: var(--green-dark);
    padding: 3px 8px;
    border-radius: 10px;
    font-weight: 500;
  }

  .appt-delete {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 14px;
    transition: color 0.2s;
  }
  .appt-delete:hover { color: var(--melon); }

  /* ADD APPT FORM */
  .add-appt-form {
    padding: 14px 18px;
    background: #fafaf8;
    border-top: 1px solid var(--border);
  }

  /* CHECKLIST */
  .checklist-tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
  }

  .checklist-tab {
    flex: 1;
    padding: 10px;
    text-align: center;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-light);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
    background: none;
    border-top: none;
    border-left: none;
    border-right: none;
    font-family: 'DM Sans', sans-serif;
  }
  .checklist-tab.active {
    color: var(--teal);
    border-bottom-color: var(--teal);
  }

  .checklist-content { padding: 14px 18px; }

  .checklist-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
  }
  .checklist-item:last-child { border-bottom: none; }

  .check-box {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 4px;
    flex-shrink: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    background: white;
  }
  .check-box.checked {
    background: var(--green);
    border-color: var(--green);
    color: white;
  }
  .check-box.checked::after { content: '✓'; font-size: 11px; font-weight: 700; }

  .check-label {
    font-size: 13px;
    flex: 1;
    transition: color 0.2s;
    cursor: pointer;
    user-select: none;
  }
  .check-label.done {
    color: var(--text-light);
    text-decoration: line-through;
  }

  .check-delete {
    background: none;
    border: none;
    color: var(--border);
    cursor: pointer;
    font-size: 13px;
    transition: color 0.2s;
    padding: 2px;
  }
  .check-delete:hover { color: var(--melon); }

  .add-task-row {
    display: flex;
    gap: 8px;
    margin-top: 12px;
    padding-top: 12px;
    border-top: 1px dashed var(--border);
  }

  .add-task-input {
    flex: 1;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    padding: 7px 11px;
    color: var(--text);
    transition: border-color 0.2s;
  }
  .add-task-input:focus { outline: none; border-color: var(--teal); }

  .add-task-btn {
    background: var(--green);
    border: none;
    border-radius: 7px;
    padding: 7px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
    color: #2a2a2a;
  }
  .add-task-btn:hover { background: var(--green-dark); }

  /* CHECKLIST RESET NOTE */
  .reset-note {
    font-size: 11px;
    color: var(--text-light);
    font-style: italic;
    text-align: right;
    padding: 6px 18px 10px;
  }

  /* PROGRESS BAR */
  .progress-bar-wrap {
    padding: 8px 18px 14px;
  }
  .progress-bar-bg {
    height: 5px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--green);
    border-radius: 3px;
    transition: width 0.3s ease;
  }
  .progress-label {
    font-size: 11px;
    color: var(--text-light);
    margin-bottom: 4px;
    display: flex;
    justify-content: space-between;
  }

  /* SUPERVISOR ONLY */
  .supervisor-only { display: none; }

  /* NOTIFICATION BANNER */
  .notif-banner {
    background: var(--melon);
    color: white;
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 500;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: slideDown 0.3s ease;
  }
  @keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .notif-close {
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
  }

  /* SECTION HEADER with count badge */
  .count-badge {
    background: var(--melon);
    color: white;
    border-radius: 10px;
    padding: 1px 7px;
    font-size: 10px;
    font-weight: 700;
  }

  /* RESPONSIVE */
  @media (max-width: 700px) {
    .main { grid-template-columns: 1fr; }
    .section-full { grid-column: 1; }
  }

  /* ADD SECTION TOGGLE */
  .add-toggle-btn {
    background: none;
    border: 1.5px dashed var(--border);
    border-radius: 7px;
    padding: 5px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.2s;
  }
  .add-toggle-btn:hover {
    border-color: var(--teal);
    color: var(--teal);
  }

  .collapsible { display: none; }
  .collapsible.open { display: block; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">🐾</div>
    <h1>ATR Front Desk</h1>
    <p>Shift Dashboard — select your name to begin</p>
    <select class="login-select" id="login-select">
      <option value="">— Select your name —</option>
      <optgroup label="FDR Team">
        <option value="Maya|fdr">Maya</option>
        <option value="Kelyn|fdr">Kelyn</option>
        <option value="Natalie|fdr">Natalie</option>
        <option value="Caitlin|fdr">Caitlin</option>
        <option value="Kyle|fdr">Kyle</option>
        <option value="Kadi|fdr">Kadi</option>
        <option value="Courtney|fdr">Courtney</option>
        <option value="Serena|fdr">Serena</option>
      </optgroup>
      <optgroup label="Leadership">
        <option value="Sadie|supervisor">Sadie</option>
        <option value="Sherry|supervisor">Sherry</option>
        <option value="Nikkieta|supervisor">Nikkieta</option>
        <option value="Abby|supervisor">Abby</option>
        <option value="Meghan|supervisor">Meghan</option>
      </optgroup>
    </select>
    <button class="login-btn" onclick="doLogin()">Start My Shift →</button>
  </div>
</div>

<!-- NOTIFICATION BANNER (hidden by default) -->
<div id="notif-banner" style="display:none;" class="notif-banner">
  <span id="notif-text"></span>
  <button class="notif-close" onclick="document.getElementById('notif-banner').style.display='none'">×</button>
</div>

<!-- APP -->
<div id="app">
  <header class="header">
    <div class="header-left">
      <div class="header-logo">🐾</div>
      <div>
        <h1>ATR Front Desk</h1>
      </div>
    </div>
    <div class="header-right">
      <span class="header-date" id="header-date"></span>
      <div class="user-badge">
        <span id="user-name-display"></span>
        <span class="user-role" id="user-role-display"></span>
      </div>
      <button class="logout-btn" onclick="doLogout()">End Shift</button>
    </div>
  </header>

  <div class="main">

    <!-- SHIFT UPDATES (full width) -->
    <div class="card section-full">
      <div class="card-header">
        <span class="card-title">
          <span class="dot" style="background:var(--melon)"></span>
          Shift Updates
          <span class="count-badge" id="unread-count" style="display:none"></span>
        </span>
        <button class="add-toggle-btn supervisor-only" onclick="toggleForm('updates-form')">+ Post Update</button>
      </div>
      <div class="card-body" id="updates-list">
        <div class="empty-state"><div class="icon">📋</div>No updates yet — check back at shift start.</div>
      </div>
      <!-- POST UPDATE FORM (supervisors only) -->
      <div class="post-update-form supervisor-only collapsible" id="updates-form">
        <div class="form-row">
          <select class="form-select" id="update-type">
            <option value="important">🔴 Important</option>
            <option value="info" selected>🔵 Info</option>
          </select>
        </div>
        <textarea class="form-textarea" id="update-text" placeholder="What should the team know before their shift?"></textarea>
        <div style="display:flex;justify-content:flex-end">
          <button class="post-btn" onclick="postUpdate()">Post Update</button>
        </div>
      </div>
    </div>

    <!-- DOGS (full width) -->
    <div class="card section-full">
      <div class="card-header">
        <span class="card-title">
          <span class="dot" style="background:var(--teal)"></span>
          Dogs — Requirements at a Glance
        </span>
        <button class="add-toggle-btn supervisor-only" onclick="toggleForm('dog-form')">+ Add Dog</button>
      </div>
      <div class="card-body">
        <div class="dogs-grid" id="dogs-grid">
          <div class="empty-state" style="grid-column:1/-1"><div class="icon">🐕</div>No dogs added yet.</div>
        </div>
      </div>
      <!-- ADD DOG FORM -->
      <div class="add-dog-form supervisor-only collapsible" id="dog-form">
        <div class="form-row">
          <input class="form-input" id="dog-name" placeholder="Dog name" style="flex:1">
          <input class="form-input" id="dog-tier" placeholder="Tier (e.g. Green Stop)" style="flex:1.5">
        </div>
        <div class="form-row">
          <input class="form-input" id="dog-reqs" placeholder="Requirements, comma separated (e.g. Dog Intro Required, Kids 5+)" style="flex:1">
        </div>
        <div style="display:flex;justify-content:flex-end">
          <button class="post-btn" onclick="addDog()">Add Dog</button>
        </div>
      </div>
    </div>

    <!-- APPOINTMENTS -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">
          <span class="dot" style="background:var(--yellow)"></span>
          Today's Appointments
        </span>
        <button class="add-toggle-btn supervisor-only" onclick="toggleForm('appt-form')">+ Add</button>
      </div>
      <div class="card-body">
        <div class="appt-list" id="appt-list">
          <div class="empty-state"><div class="icon">📅</div>No appointments added yet.</div>
        </div>
      </div>
      <!-- ADD APPT FORM -->
      <div class="add-dog-form supervisor-only collapsible" id="appt-form">
        <div class="form-row">
          <input class="form-input" id="appt-time" placeholder="Time (e.g. 2:00 PM)" style="width:110px">
          <input class="form-input" id="appt-dog" placeholder="Dog name" style="flex:1">
        </div>
        <div class="form-row">
          <input class="form-input" id="appt-adopter" placeholder="Adopter name" style="flex:1">
          <input class="form-input" id="appt-handler" placeholder="Handler" style="flex:1">
        </div>
        <div style="display:flex;justify-content:flex-end">
          <button class="post-btn" onclick="addAppt()">Add Appointment</button>
        </div>
      </div>
    </div>

    <!-- MY CHECKLIST -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">
          <span class="dot" style="background:var(--green)"></span>
          My Checklist
        </span>
      </div>
      <div class="checklist-tabs">
        <button class="checklist-tab active" onclick="switchTab('daily')" id="tab-daily">Daily</button>
        <button class="checklist-tab" onclick="switchTab('weekly')" id="tab-weekly">Weekly</button>
        <button class="checklist-tab" onclick="switchTab('monthly')" id="tab-monthly">Monthly</button>
      </div>
      <div id="checklist-progress" class="progress-bar-wrap" style="display:none">
        <div class="progress-label">
          <span id="progress-text"></span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill"></div>
        </div>
      </div>
      <div class="checklist-content" id="checklist-body"></div>
      <div class="reset-note" id="reset-note"></div>
    </div>

  </div>
</div>

<script>
// ─── STATE ──────────────────────────────────────────────────────────────────
let currentUser = null;
let currentRole = null;
let currentTab = 'daily';

const DEFAULT_TASKS = {
  daily: [
    'Review shift updates above',
    'Check emails & Google Voice messages',
    'Kennel walkthrough — check kennel cards',
    'Water jugs',
    'Bathroom check',
    'Review passdown from previous shift',
    'Check adoption confirmation texts',
    'Profile checks',
  ],
  weekly: [
    'Inventory check',
    'Pupper Media (photos)',
    'FDR slideshow update',
    'Bank run (Tuesdays)',
    'Deep clean front desk area',
    'Update foster report card binder',
    'Submit timecard',
  ],
  monthly: [
    'Full inventory audit',
    'Review updated SOPs',
    'Canine Corner stock check',
    'Go-home folder supplies check',
    'Update kennel card binder',
  ]
};

// ─── DATE HELPERS ─────────────────────────────────────────────────────────────
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}
function weekKey() {
  const d = new Date();
  const start = new Date(d);
  start.setDate(d.getDate() - d.getDay());
  return `${start.getFullYear()}-${start.getMonth()}-${start.getDate()}`;
}
function monthKey() {
  const d = new Date();
  return `${d.getFullYear()}-${d.getMonth()}`;
}
function getResetKey(tab) {
  if (tab === 'daily') return todayKey();
  if (tab === 'weekly') return weekKey();
  return monthKey();
}
function getResetLabel(tab) {
  if (tab === 'daily') return 'Resets each day';
  if (tab === 'weekly') return 'Resets each Monday';
  return 'Resets each month';
}

// ─── STORAGE HELPERS ─────────────────────────────────────────────────────────
async function save(key, value, shared = false) {
  try { await window.storage.set(key, JSON.stringify(value), shared); } catch(e) {}
}
async function load(key, shared = false) {
  try {
    const r = await window.storage.get(key, shared);
    return r ? JSON.parse(r.value) : null;
  } catch(e) { return null; }
}

// ─── LOGIN ────────────────────────────────────────────────────────────────────
function doLogin() {
  const val = document.getElementById('login-select').value;
  if (!val) return;
  const [name, role] = val.split('|');
  currentUser = name;
  currentRole = role;
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-name-display').textContent = name;
  document.getElementById('user-role-display').textContent = role === 'supervisor' ? 'Supervisor' : 'FDR';
  document.getElementById('header-date').textContent = new Date().toLocaleDateString('en-US', {weekday:'short', month:'short', day:'numeric'});

  if (role === 'supervisor') {
    document.querySelectorAll('.supervisor-only').forEach(el => el.style.display = '');
  }

  loadAll();
}

function doLogout() {
  currentUser = null;
  currentRole = null;
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-select').value = '';
  document.querySelectorAll('.supervisor-only').forEach(el => el.style.display = 'none');
}

// ─── LOAD ALL ─────────────────────────────────────────────────────────────────
async function loadAll() {
  await loadUpdates();
  await loadDogs();
  await loadAppts();
  renderChecklist();
}

// ─── UPDATES ─────────────────────────────────────────────────────────────────
async function loadUpdates() {
  const updates = (await load('fdr:updates', true)) || [];
  const readSet = (await load(`fdr:read:${currentUser}`, false)) || {};
  renderUpdates(updates, readSet);
}

function renderUpdates(updates, readSet) {
  const list = document.getElementById('updates-list');
  if (!updates.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📋</div>No updates yet.</div>';
    document.getElementById('unread-count').style.display = 'none';
    return;
  }
  const unreadCount = updates.filter(u => !readSet[u.id]).length;
  const badge = document.getElementById('unread-count');
  if (unreadCount > 0) { badge.style.display = ''; badge.textContent = unreadCount + ' new'; }
  else badge.style.display = 'none';

  list.innerHTML = [...updates].reverse().map(u => {
    const isRead = !!readSet[u.id];
    return `
      <div class="update-item">
        <span class="unread-dot ${isRead ? 'seen' : ''}"></span>
        <span class="update-badge badge-${u.type}">${u.type === 'important' ? '🔴 Important' : '🔵 Info'}</span>
        <div class="update-content">
          <div class="update-text">${escHtml(u.text)}</div>
          <div class="update-meta">
            <span class="update-author">${escHtml(u.author)}</span>
            <span class="update-time">${u.time}</span>
          </div>
        </div>
        <button class="read-btn ${isRead ? 'read' : ''}" onclick="markRead('${u.id}')">${isRead ? '✓ Read' : 'Mark read'}</button>
        ${currentRole === 'supervisor' ? `<button class="read-btn" onclick="deleteUpdate('${u.id}')" style="border-color:var(--border);color:var(--melon)">×</button>` : ''}
      </div>`;
  }).join('');
}

async function postUpdate() {
  const text = document.getElementById('update-text').value.trim();
  if (!text) return;
  const type = document.getElementById('update-type').value;
  const updates = (await load('fdr:updates', true)) || [];
  updates.push({
    id: Date.now().toString(),
    text, type,
    author: currentUser,
    time: new Date().toLocaleString('en-US', {month:'short', day:'numeric', hour:'numeric', minute:'2-digit'})
  });
  await save('fdr:updates', updates, true);
  document.getElementById('update-text').value = '';
  const readSet = (await load(`fdr:read:${currentUser}`, false)) || {};
  renderUpdates(updates, readSet);
  showNotif('Update posted!');
}

async function markRead(id) {
  const readSet = (await load(`fdr:read:${currentUser}`, false)) || {};
  readSet[id] = true;
  await save(`fdr:read:${currentUser}`, readSet, false);
  const updates = (await load('fdr:updates', true)) || [];
  renderUpdates(updates, readSet);
}

async function deleteUpdate(id) {
  let updates = (await load('fdr:updates', true)) || [];
  updates = updates.filter(u => u.id !== id);
  await save('fdr:updates', updates, true);
  const readSet = (await load(`fdr:read:${currentUser}`, false)) || {};
  renderUpdates(updates, readSet);
}

// ─── DOGS ─────────────────────────────────────────────────────────────────────
async function loadDogs() {
  const dogs = (await load('fdr:dogs', true)) || [];
  renderDogs(dogs);
}

function renderDogs(dogs) {
  const grid = document.getElementById('dogs-grid');
  if (!dogs.length) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">🐕</div>No dogs added yet.</div>';
    return;
  }
  grid.innerHTML = dogs.map(d => {
    const reqs = (d.reqs || '').split(',').map(r => r.trim()).filter(Boolean);
    const reqTags = reqs.map(r => {
      const cls = r.toLowerCase().includes('dog intro') ? 'req-dog' :
                  r.toLowerCase().includes('kids') || r.toLowerCase().includes('waiver') ? 'req-special' : '';
      return `<span class="req-tag ${cls}">${escHtml(r)}</span>`;
    }).join('');
    return `
      <div class="dog-card">
        ${currentRole === 'supervisor' ? `<button class="dog-delete" onclick="deleteDog('${d.id}')">×</button>` : ''}
        <div class="dog-name">${escHtml(d.name)}</div>
        <div class="dog-tier">${escHtml(d.tier)}</div>
        <div class="dog-reqs">${reqTags || '<span style="color:var(--text-light);font-size:11px">No special requirements</span>'}</div>
      </div>`;
  }).join('');
}

async function addDog() {
  const name = document.getElementById('dog-name').value.trim();
  if (!name) return;
  const dogs = (await load('fdr:dogs', true)) || [];
  dogs.push({
    id: Date.now().toString(),
    name,
    tier: document.getElementById('dog-tier').value.trim(),
    reqs: document.getElementById('dog-reqs').value.trim()
  });
  await save('fdr:dogs', dogs, true);
  document.getElementById('dog-name').value = '';
  document.getElementById('dog-tier').value = '';
  document.getElementById('dog-reqs').value = '';
  renderDogs(dogs);
  showNotif('Dog added!');
}

async function deleteDog(id) {
  let dogs = (await load('fdr:dogs', true)) || [];
  dogs = dogs.filter(d => d.id !== id);
  await save('fdr:dogs', dogs, true);
  renderDogs(dogs);
}

// ─── APPOINTMENTS ─────────────────────────────────────────────────────────────
async function loadAppts() {
  const appts = (await load('fdr:appts', true)) || [];
  renderAppts(appts);
}

function renderAppts(appts) {
  const list = document.getElementById('appt-list');
  if (!appts.length) {
    list.innerHTML = '<div class="empty-state"><div class="icon">📅</div>No appointments today.</div>';
    return;
  }
  const sorted = [...appts].sort((a, b) => a.time.localeCompare(b.time));
  list.innerHTML = sorted.map(a => `
    <div class="appt-item">
      <span class="appt-time">${escHtml(a.time)}</span>
      <div class="appt-info">
        <div class="appt-dog">${escHtml(a.dog)}</div>
        <div class="appt-adopter">${escHtml(a.adopter)}</div>
      </div>
      <span class="appt-handler">${escHtml(a.handler)}</span>
      ${currentRole === 'supervisor' ? `<button class="appt-delete" onclick="deleteAppt('${a.id}')">×</button>` : ''}
    </div>`).join('');
}

async function addAppt() {
  const time = document.getElementById('appt-time').value.trim();
  const dog = document.getElementById('appt-dog').value.trim();
  if (!time || !dog) return;
  const appts = (await load('fdr:appts', true)) || [];
  appts.push({
    id: Date.now().toString(),
    time, dog,
    adopter: document.getElementById('appt-adopter').value.trim(),
    handler: document.getElementById('appt-handler').value.trim()
  });
  await save('fdr:appts', appts, true);
  ['appt-time','appt-dog','appt-adopter','appt-handler'].forEach(id => document.getElementById(id).value = '');
  renderAppts(appts);
  showNotif('Appointment added!');
}

async function deleteAppt(id) {
  let appts = (await load('fdr:appts', true)) || [];
  appts = appts.filter(a => a.id !== id);
  await save('fdr:appts', appts, true);
  renderAppts(appts);
}

// ─── CHECKLIST ────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ['daily','weekly','monthly'].forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
  renderChecklist();
}

async function renderChecklist() {
  const tab = currentTab;
  const resetKey = getResetKey(tab);
  const storageKey = `fdr:checklist:${currentUser}:${tab}:${resetKey}`;
  let data = await load(storageKey, false);

  // First time this period — seed defaults
  if (!data) {
    data = { tasks: DEFAULT_TASKS[tab].map((t, i) => ({ id: `default-${i}`, label: t, done: false })) };
    await save(storageKey, data, false);
  }

  const tasks = data.tasks;
  const done = tasks.filter(t => t.done).length;
  const pct = tasks.length ? Math.round(done / tasks.length * 100) : 0;

  const progressWrap = document.getElementById('checklist-progress');
  if (tasks.length) {
    progressWrap.style.display = '';
    document.getElementById('progress-text').textContent = `${done} / ${tasks.length} complete`;
    document.getElementById('progress-fill').style.width = pct + '%';
  } else {
    progressWrap.style.display = 'none';
  }

  const body = document.getElementById('checklist-body');
  body.innerHTML = tasks.map(t => `
    <div class="checklist-item">
      <div class="check-box ${t.done ? 'checked' : ''}" onclick="toggleTask('${t.id}')"></div>
      <span class="check-label ${t.done ? 'done' : ''}" onclick="toggleTask('${t.id}')">${escHtml(t.label)}</span>
      <button class="check-delete" onclick="deleteTask('${t.id}')">×</button>
    </div>`).join('') +
    `<div class="add-task-row">
      <input class="add-task-input" id="new-task-input" placeholder="Add a task…" onkeydown="if(event.key==='Enter')addTask()">
      <button class="add-task-btn" onclick="addTask()">+ Add</button>
    </div>`;

  document.getElementById('reset-note').textContent = getResetLabel(tab);
}

async function toggleTask(id) {
  const tab = currentTab;
  const storageKey = `fdr:checklist:${currentUser}:${tab}:${getResetKey(tab)}`;
  const data = await load(storageKey, false);
  const task = data.tasks.find(t => t.id === id);
  if (task) task.done = !task.done;
  await save(storageKey, data, false);
  renderChecklist();
}

async function deleteTask(id) {
  const tab = currentTab;
  const storageKey = `fdr:checklist:${currentUser}:${tab}:${getResetKey(tab)}`;
  const data = await load(storageKey, false);
  data.tasks = data.tasks.filter(t => t.id !== id);
  await save(storageKey, data, false);
  renderChecklist();
}

async function addTask() {
  const input = document.getElementById('new-task-input');
  const label = input.value.trim();
  if (!label) return;
  const tab = currentTab;
  const storageKey = `fdr:checklist:${currentUser}:${tab}:${getResetKey(tab)}`;
  const data = await load(storageKey, false);
  data.tasks.push({ id: Date.now().toString(), label, done: false });
  await save(storageKey, data, false);
  input.value = '';
  renderChecklist();
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function toggleForm(id) {
  document.getElementById(id).classList.toggle('open');
}

function showNotif(msg) {
  const banner = document.getElementById('notif-banner');
  document.getElementById('notif-text').textContent = msg;
  banner.style.display = 'flex';
  setTimeout(() => { banner.style.display = 'none'; }, 3000);
}

function escHtml(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
